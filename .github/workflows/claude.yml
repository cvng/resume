name: Claude Code

on:
    issue_comment: { types: [created] }
    pull_request_review_comment: { types: [created] }
    pull_request_review: { types: [submitted] }
    issues: { types: [opened, assigned] }
    pull_request: { types: [opened, ready_for_review, reopened, synchronize] }

jobs:
    claude:
        if: |
            (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
            (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
            (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read # Required for Claude to read CI results on PRs
        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 1
            - uses: anthropics/claude-code-action@v1
              with:
                  claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
                  use_commit_signing: true

    review:
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  fetch-depth: 1
            - name: Check skip marker
              id: skip_check
              run: |
                  msg=$(git log -1 --format=%B)
                  if grep -qiE '\[skip[- ]claude\]|\[claude[- ]skip\]' <<< "$msg"; then
                      echo "Skip marker found in HEAD commit message; skipping review."
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "skip=false" >> "$GITHUB_OUTPUT"
                  fi
            - uses: anthropics/claude-code-action@v1
              id: review
              if: steps.skip_check.outputs.skip != 'true'
              with:
                  claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
                  track_progress: true
                  prompt: |
                      /code-review ${{ github.event.pull_request.number }} --comment

                      After posting the review comments, respond with a final JSON
                      object matching the given schema. Set "blocking" to true only
                      if at least one finding is severe enough that this PR must not
                      be merged as-is (broken build pipeline, corrupted PDF output,
                      incorrect resume content). Cosmetic or optional suggestions are
                      not blocking.
                  claude_args: |
                      --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
                      --output-format json
                      --json-schema "{\"type\":\"object\",\"properties\":{\"blocking\":{\"type\":\"boolean\"},\"reason\":{\"type\":\"string\"}},\"required\":[\"blocking\"]}"
            - name: Submit review verdict
              if: steps.skip_check.outputs.skip != 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  STRUCTURED_OUTPUT: ${{ steps.review.outputs.structured_output }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  if [ -z "$STRUCTURED_OUTPUT" ]; then
                      echo "::error::Claude review produced no structured verdict (e.g. this PR edits claude.yml itself, which the action refuses to self-review). Failing closed — use [skip-claude] in a commit message to bypass intentionally."
                      exit 1
                  fi
                  blocking=$(jq -r '.blocking // false' <<< "$STRUCTURED_OUTPUT")
                  reason=$(jq -r '.reason // "See inline comments."' <<< "$STRUCTURED_OUTPUT")
                  if [ "$blocking" = "true" ]; then
                      gh pr review "$PR_NUMBER" --request-changes --body "Blocking findings: $reason"
                      echo "::error::Claude review found blocking issues: $reason"
                      exit 1
                  else
                      gh pr review "$PR_NUMBER" --approve --body "No blocking findings. $reason"
                  fi
